<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>互動遊戲 - 題目編輯器</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+TC:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(22, 28, 45, 0.6);
            --primary: #4f46e5;
            --primary-glow: rgba(79, 70, 229, 0.4);
            --success: #10b981;
            --success-glow: rgba(16, 185, 129, 0.3);
            --danger: #ef4444;
            --danger-glow: rgba(239, 68, 68, 0.3);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border-color: rgba(255, 255, 255, 0.08);
            --input-bg: rgba(17, 24, 39, 0.8);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', 'Noto Sans TC', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            background-image: 
                radial-gradient(at 10% 20%, rgba(79, 70, 229, 0.15) 0px, transparent 50%),
                radial-gradient(at 90% 80%, rgba(16, 185, 129, 0.1) 0px, transparent 50%);
        }

        header {
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            background: rgba(11, 15, 25, 0.8);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #818cf8, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }

        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            margin-left: 20px;
            font-weight: 600;
            transition: color 0.3s;
        }

        .nav-links a:hover, .nav-links a.active {
            color: var(--text-main);
        }

        .container {
            max-width: 1000px;
            width: 100%;
            margin: 30px auto;
            padding: 0 20px;
            flex-grow: 1;
        }

        .page-title-section {
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .page-title {
            font-size: 28px;
            font-weight: 800;
        }

        .page-desc {
            color: var(--text-muted);
            margin-top: 5px;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: inherit;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), #6366f1);
            color: white;
            box-shadow: 0 4px 14px var(--primary-glow);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(79, 70, 229, 0.6);
        }

        .btn-success {
            background: linear-gradient(135deg, var(--success), #34d399);
            color: white;
            box-shadow: 0 4px 14px var(--success-glow);
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.5);
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.15);
            color: #fca5a5;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .btn-danger:hover {
            background: var(--danger);
            color: white;
            box-shadow: 0 4px 14px var(--danger-glow);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        /* Question Cards */
        .question-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 40px;
        }

        .q-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 24px;
            backdrop-filter: blur(8px);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .q-card:hover {
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3);
        }

        .q-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .q-num {
            font-size: 14px;
            font-weight: 800;
            text-transform: uppercase;
            color: #818cf8;
            background: rgba(99, 102, 241, 0.15);
            padding: 4px 12px;
            border-radius: 30px;
            border: 1px solid rgba(99, 102, 241, 0.2);
        }

        .q-actions {
            display: flex;
            gap: 10px;
        }

        .input-group {
            margin-bottom: 16px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
        }

        .form-control {
            width: 100%;
            padding: 12px 16px;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-main);
            font-family: inherit;
            font-size: 15px;
            transition: all 0.3s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-glow);
        }

        /* Image Upload Styles */
        .image-upload-zone {
            border: 1px dashed var(--border-color);
            background: rgba(255, 255, 255, 0.01);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            min-height: 80px;
        }

        .img-preview-container {
            display: flex;
            align-items: center;
            gap: 20px;
            width: 100%;
        }

        .img-preview {
            max-width: 180px;
            max-height: 120px;
            border-radius: 8px;
            object-fit: contain;
            border: 1px solid var(--border-color);
            background: #000;
        }

        .btn-remove-img {
            padding: 8px 16px;
            font-size: 14px;
        }

        .upload-placeholder {
            display: flex;
            align-items: center;
            width: 100%;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-top: 10px;
        }

        .option-wrapper {
            position: relative;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
            padding-right: 50px;
        }

        .option-wrapper.correct {
            border-color: var(--success);
            background: rgba(16, 185, 129, 0.05);
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.1);
        }

        /* Option Color Accents */
        .option-wrapper::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 5px;
            border-top-left-radius: 12px;
            border-bottom-left-radius: 12px;
        }
        .option-wrapper:nth-child(1)::before { background-color: #ef4444; }
        .option-wrapper:nth-child(2)::before { background-color: #3b82f6; }
        .option-wrapper:nth-child(3)::before { background-color: #eab308; }
        .option-wrapper:nth-child(4)::before { background-color: #22c55e; }

        .correct-check {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 2px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .option-wrapper.correct .correct-check {
            background-color: var(--success);
            border-color: var(--success);
        }

        .option-wrapper.correct .correct-check::after {
            content: '✓';
            color: white;
            font-size: 14px;
            font-weight: 800;
        }

        .meta-row {
            display: flex;
            gap: 20px;
            margin-top: 16px;
        }

        .meta-row .input-group {
            flex: 1;
            margin-bottom: 0;
        }

        .floating-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(11, 15, 25, 0.85);
            backdrop-filter: blur(16px);
            border-top: 1px solid var(--border-color);
            padding: 16px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .toast {
            position: fixed;
            top: 95px;
            right: 20px;
            padding: 14px 24px;
            background: var(--success);
            color: white;
            font-weight: bold;
            border-radius: 10px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            transform: translateY(-150%);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
        }
        .toast.show {
            transform: translateY(0);
        }
        .toast.error {
            background: var(--danger);
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">Interactive Quiz Creator</div>
        <div style="display: flex; align-items: center; gap: 20px;">
            <div style="display: flex; align-items: center; gap: 8px;">
                <span style="font-size: 14px; font-weight: 600; color: var(--text-muted);">目前組別：</span>
                <select id="setSelect" class="form-control" style="width: auto; padding: 6px 12px; height: 38px; border-radius: 10px; background: rgba(17, 24, 39, 0.8); color: var(--text-main); font-weight: 700; border: 1px solid var(--border-color); cursor: pointer;" onchange="changeActiveSet(this.value)">
                </select>
                <button class="btn btn-secondary" style="padding: 8px 14px; font-size: 14px; border-radius: 10px;" onclick="createNewSet()">📁 新增組別</button>
                <button class="btn btn-danger" style="padding: 8px 14px; font-size: 14px; border-radius: 10px;" onclick="deleteCurrentSet()">🗑️ 刪除組別</button>
            </div>
            <div class="nav-links">
                <a href="/host">投影主畫面</a>
                <a href="/player">手機玩家畫面</a>
                <a href="/creator" class="active">題目編輯器</a>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="page-title-section">
            <div>
                <h1 class="page-title">編輯遊戲題目</h1>
                <p class="page-desc">新增、修改或刪除互動遊戲中的選擇題與解答。您可以為題目上傳圖片。</p>
            </div>
            <button class="btn btn-primary" onclick="addNewQuestion()">＋ 新增題目</button>
        </div>

        <div id="questionList" class="question-list">
            <!-- Questions cards will be dynamically loaded here -->
        </div>

        <div style="height: 100px;"></div> <!-- Spacer for floating footer -->
    </div>

    <div class="floating-footer">
        <span style="color: var(--text-muted); font-size: 14px;" id="questionCountText">共 0 個題目</span>
        <div style="display: flex; gap: 15px;">
            <button class="btn btn-secondary" onclick="fetchQuestionsForSet(currentSetName)">放棄變更</button>
            <button class="btn btn-success" onclick="saveQuestionsToServer()">儲存題目設定</button>
        </div>
    </div>

    <div id="toast" class="toast">儲存成功！</div>

    <script>
        let questions = [];
        let currentSetName = "";

        async function loadQuestionSets() {
            try {
                const response = await fetch('/api/question_sets');
                if (response.ok) {
                    const data = await response.json();
                    currentSetName = data.current_set;
                    
                    const setSelect = document.getElementById('setSelect');
                    setSelect.innerHTML = '';
                    data.sets.forEach(s => {
                        const opt = document.createElement('option');
                        opt.value = s.name;
                        opt.innerText = `${s.name} (${s.count} 題)`;
                        if (s.name === currentSetName) {
                            opt.selected = true;
                        }
                        setSelect.appendChild(opt);
                    });
                    
                    await fetchQuestionsForSet(currentSetName);
                } else {
                    showToast('讀取題目組別失敗。', true);
                }
            } catch (error) {
                console.error(error);
                showToast('伺服器連線錯誤。', true);
            }
        }

        async function fetchQuestionsForSet(setName) {
            try {
                const response = await fetch(`/api/questions?set=${encodeURIComponent(setName)}`);
                if (response.ok) {
                    questions = await response.json();
                    renderQuestions();
                } else {
                    showToast('讀取題目失敗。', true);
                }
            } catch (error) {
                console.error(error);
                showToast('伺服器連線錯誤。', true);
            }
        }

        async function changeActiveSet(setName) {
            if (confirm("切換組別將會載入該組別的題目，未儲存的變更將會遺失。是否確定切換？")) {
                currentSetName = setName;
                await fetchQuestionsForSet(currentSetName);
            } else {
                document.getElementById('setSelect').value = currentSetName;
            }
        }

        async function createNewSet() {
            const name = prompt("請輸入新組別的名稱（例如：化學常識）：");
            if (name === null) return;
            
            const trimmedName = name.trim();
            if (!trimmedName) {
                alert("組別名稱不能為空！");
                return;
            }

            try {
                const response = await fetch(`/api/question_sets/new?name=${encodeURIComponent(trimmedName)}`, {
                    method: 'POST'
                });
                
                if (response.ok) {
                    showToast('新增組別成功！', false);
                    await loadQuestionSets();
                    document.getElementById('setSelect').value = trimmedName;
                    currentSetName = trimmedName;
                    await fetchQuestionsForSet(currentSetName);
                } else {
                    const err = await response.json();
                    showToast('新增組別失敗：' + (err.detail || response.statusText), true);
                }
            } catch (error) {
                console.error(error);
                showToast('伺服器連線錯誤。', true);
            }
        }

        async function deleteCurrentSet() {
            if (!currentSetName) return;
            
            if (!confirm(`⚠️ 警告：確定要刪除整個題目組別「${currentSetName}」嗎？\n此動作將會永久刪除該組別的所有題目，且無法復原！`)) {
                return;
            }

            try {
                const response = await fetch(`/api/question_sets?name=${encodeURIComponent(currentSetName)}`, {
                    method: 'DELETE'
                });
                
                if (response.ok) {
                    showToast('組別刪除成功！', false);
                    await loadQuestionSets();
                } else {
                    const err = await response.json();
                    showToast('刪除組別失敗：' + (err.detail || response.statusText), true);
                }
            } catch (error) {
                console.error(error);
                showToast('伺服器連線錯誤。', true);
            }
        }

        // Render cards
        function renderQuestions() {
            const listContainer = document.getElementById('questionList');
            listContainer.innerHTML = '';
            
            questions.forEach((q, qIndex) => {
                const card = document.createElement('div');
                card.className = 'q-card';
                card.innerHTML = `
                    <div class="q-header">
                        <span class="q-num">第 ${qIndex + 1} 題</span>
                        <div class="q-actions">
                            <button class="btn btn-secondary" style="padding: 6px 12px; font-size: 12px;" onclick="moveQuestion(${qIndex}, -1)" ${qIndex === 0 ? 'disabled' : ''}>▲ 上移</button>
                            <button class="btn btn-secondary" style="padding: 6px 12px; font-size: 12px;" onclick="moveQuestion(${qIndex}, 1)" ${qIndex === questions.length - 1 ? 'disabled' : ''}>▼ 下移</button>
                            <button class="btn btn-danger" style="padding: 6px 12px; font-size: 12px;" onclick="deleteQuestion(${qIndex})">刪除</button>
                        </div>
                    </div>
                    
                    <div class="input-group">
                        <label>題目敘述</label>
                        <input type="text" class="form-control" value="${escapeHtml(q.question)}" oninput="updateQuestionText(${qIndex}, this.value)" placeholder="例如：這張圖片顯示的是什麼？（若題目已做成圖片，此處可填寫簡短提示）">
                    </div>

                    <div class="input-group">
                        <label>題目圖片 (選填，適合已製作成圖片的題目)</label>
                        <div class="image-upload-zone" id="img-zone-${qIndex}">
                            ${q.image_url ? `
                                <div class="img-preview-container">
                                    <img src="${q.image_url}" class="img-preview" alt="題目圖片">
                                    <button class="btn btn-danger btn-remove-img" onclick="removeQuestionImage(${qIndex})">移除圖片</button>
                                </div>
                            ` : `
                                <div class="upload-placeholder">
                                    <input type="file" id="file-input-${qIndex}" accept="image/*" style="display: none;" onchange="handleImageUpload(${qIndex}, this)">
                                    <button class="btn btn-secondary" onclick="document.getElementById('file-input-${qIndex}').click()">＋ 上傳圖片</button>
                                    <span style="font-size: 13px; color: var(--text-muted); margin-left: 10px;">支援 PNG, JPG, JPEG, GIF, WEBP 等格式</span>
                                </div>
                            `}
                        </div>
                    </div>

                    <label style="display: block; font-size: 14px; font-weight: 600; color: var(--text-muted); margin-bottom: 8px;">答案選項 (請在正確選項右方打勾)</label>
                    <div class="options-grid">
                        ${q.options.map((opt, oIndex) => `
                            <div class="option-wrapper ${q.correct_index === oIndex ? 'correct' : ''}" id="opt-wrap-${qIndex}-${oIndex}">
                                <input type="text" class="form-control" value="${escapeHtml(opt)}" oninput="updateOptionText(${qIndex}, ${oIndex}, this.value)" placeholder="選項 ${oIndex + 1}">
                                <div class="correct-check" onclick="setCorrectOption(${qIndex}, ${oIndex})"></div>
                            </div>
                        `).join('')}
                    </div>

                    <div class="meta-row">
                        <div class="input-group">
                            <label>答題時間限制 (秒)</label>
                            <input type="number" class="form-control" min="5" max="120" value="${q.time_limit || 20}" oninput="updateTimeLimit(${qIndex}, this.value)">
                        </div>
                    </div>
                `;
                listContainer.appendChild(card);
            });

            document.getElementById('questionCountText').innerText = `共 ${questions.length} 個題目`;
        }

        // Action updates
        function updateQuestionText(qIndex, val) {
            questions[qIndex].question = val;
        }

        function updateOptionText(qIndex, oIndex, val) {
            questions[qIndex].options[oIndex] = val;
        }

        function setCorrectOption(qIndex, oIndex) {
            questions[qIndex].correct_index = oIndex;
            for (let i = 0; i < 4; i++) {
                const el = document.getElementById(`opt-wrap-${qIndex}-${i}`);
                if (i === oIndex) {
                    el.classList.add('correct');
                } else {
                    el.classList.remove('correct');
                }
            }
        }

        function updateTimeLimit(qIndex, val) {
            const limit = parseInt(val) || 20;
            questions[qIndex].time_limit = limit;
        }

        // Image upload AJAX
        async function handleImageUpload(qIndex, input) {
            const file = input.files[0];
            if (!file) return;

            if (!file.type.startsWith('image/')) {
                showToast('請上傳圖片檔案！', true);
                return;
            }

            const formData = new FormData();
            formData.append('file', file);

            const zone = document.getElementById(`img-zone-${qIndex}`);
            zone.innerHTML = `<span style="font-size: 14px; color: var(--text-muted);">圖片上傳中...</span>`;

            try {
                const response = await fetch('/api/upload', {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    const result = await response.json();
                    questions[qIndex].image_url = result.url;
                    showToast('圖片上傳成功！', false);
                    renderQuestions();
                } else {
                    const err = await response.json();
                    showToast('上傳失敗：' + (err.detail || response.statusText), true);
                    renderQuestions();
                }
            } catch (error) {
                console.error(error);
                showToast('連線錯誤，無法上傳圖片。', true);
                renderQuestions();
            }
        }

        function removeQuestionImage(qIndex) {
            questions[qIndex].image_url = null;
            showToast('圖片已移除。', false);
            renderQuestions();
        }

        function addNewQuestion() {
            questions.push({
                question: "",
                options: ["選項一", "選項二", "選項三", "選項四"],
                correct_index: 0,
                time_limit: 15,
                image_url: null
            });
            renderQuestions();
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        function deleteQuestion(index) {
            if (confirm(`確定要刪除第 ${index + 1} 題嗎？`)) {
                questions.splice(index, 1);
                renderQuestions();
            }
        }

        function moveQuestion(index, direction) {
            const targetIndex = index + direction;
            if (targetIndex < 0 || targetIndex >= questions.length) return;
            
            const temp = questions[index];
            questions[index] = questions[targetIndex];
            questions[targetIndex] = temp;
            
            renderQuestions();
        }

        // Save back to server
        async function saveQuestionsToServer() {
            // Validation
            for (let i = 0; i < questions.length; i++) {
                const q = questions[i];
                if (!q.question.trim() && !q.image_url) {
                    showToast(`第 ${i + 1} 題題目或題目圖片至少填寫一項！`, true);
                    return;
                }
                for (let o = 0; o < 4; o++) {
                    if (!q.options[o].trim()) {
                        showToast(`第 ${i + 1} 題的選項 ${o + 1} 不能為空！`, true);
                        return;
                    }
                }
            }

            try {
                const response = await fetch(`/api/questions?set=${encodeURIComponent(currentSetName)}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(questions)
                });
                
                if (response.ok) {
                    showToast('題目儲存成功！', false);
                    await loadQuestionSets();
                } else {
                    const err = await response.json();
                    showToast('儲存失敗：' + (err.detail || response.statusText), true);
                }
            } catch (error) {
                console.error(error);
                showToast('連線失敗，無法儲存。', true);
            }
        }

        // UI Toast
        function showToast(text, isError = false) {
            const toast = document.getElementById('toast');
            toast.innerText = text;
            if (isError) {
                toast.classList.add('error');
            } else {
                toast.classList.remove('error');
            }
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // Utility
        function escapeHtml(text) {
            if (!text) return "";
            return text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        window.onload = loadQuestionSets;
    </script>
</body>
</html>
